<!doctype html><html><head><meta charset="utf-8"><title>Fasting Window</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
    body { margin:0; background:#1A0C08; color:#f2f2f5; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
    .wrap { max-width:640px; margin:0 auto; padding:80px 24px; text-align:center; }
    h1 { font-size:2.2rem; margin-bottom:8px; }
    .accent { color:#FF6B4A; }
    p { color:#c9c9d2; line-height:1.6; }
    a { color:#FF6B4A; }
    .badge { display:inline-block; margin-top:24px; padding:10px 20px; border:1px solid #FF6B4A; border-radius:24px; color:#FF6B4A; text-decoration:none; }
    footer { margin-top:64px; font-size:0.8rem; color:#77778a; }
    
  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #4FB0AE55 0%, #4FB0AE00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style></head><body>
<div class="orb"></div>
<div class="wrap">
<h1><span class="accent">Fasting Window</span></h1>
<p>A simple start/stop timer for intermittent fasting windows with a history log.</p>
<a class="badge" href="#">Get it on the App Store</a>
<footer><a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a><br>Contact: s0533495227@gmail.com</footer>
</div>
</body></html>
