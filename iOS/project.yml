name: FastingWindow
options:
  bundleIdPrefix: com.shimondeitel.fastwindow
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  FastingWindow:
    type: application
    platform: iOS
    sources:
      - path: FastingWindow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fastwindow
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: FastingWindow/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FastingWindowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FastingWindowTests
      - path: FastingWindow.storekit
    dependencies:
      - target: FastingWindow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fastwindow.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FastingWindowUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FastingWindowUITests
    dependencies:
      - target: FastingWindow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fastwindow.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  FastingWindow:
    build:
      targets:
        FastingWindow: all
        FastingWindowTests: [test]
        FastingWindowUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: FastingWindow.storekit
    test:
      config: Debug
      storeKitConfiguration: FastingWindow.storekit
      targets:
        - FastingWindowTests
        - FastingWindowUITests
    archive:
      config: Release
